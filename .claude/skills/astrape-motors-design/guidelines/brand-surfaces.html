<!-- @dsCard group="Brand" viewport="700x220" name="Surfaces encode mode" subtitle="FOCAL · INFO · METHOD · PEOPLE" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text-primary); font-family: var(--font-mono); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 22px 28px; }
  .cell { position: relative; height: 78px; border-radius: 6px; border: 1px solid var(--line); padding: 14px 16px; overflow: hidden; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--text-primary); }
  .desc { font-size: 10.5px; color: var(--text-tertiary); margin-top: 4px; }
  .focal { background: radial-gradient(ellipse at 70% 20%, color-mix(in srgb,var(--brand-blue) 22%,transparent), transparent 60%), var(--bg); }
  .info { background: var(--surface-card); }
  .method { background-color: var(--bg-process); background-image: linear-gradient(color-mix(in srgb,var(--brand-blue) 8%,transparent) 1px,transparent 1px),linear-gradient(90deg,color-mix(in srgb,var(--brand-blue) 8%,transparent) 1px,transparent 1px); background-size: 22px 22px; box-shadow: var(--shadow-recessed); }
  .people { background: var(--people-panel); border-color: var(--line-faint); }
</style>
</head>
<body>
<div class="grid">
  <div class="cell focal"><div class="name">FOCAL</div><div class="desc">glow — the two brand moments (hero, contact)</div></div>
  <div class="cell info"><div class="name">INFO</div><div class="desc">flat dark — capabilities, sectors</div></div>
  <div class="cell method"><div class="name">METHOD</div><div class="desc">recessed blueprint grid — the process band</div></div>
  <div class="cell people" style="color:var(--people-heading)"><div class="name" style="color:var(--people-heading)">PEOPLE</div><div class="desc" style="color:var(--people-text)">floating aubergine panel — the team</div></div>
</div>
</body>
</html>
