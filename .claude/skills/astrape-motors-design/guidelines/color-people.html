<!-- @dsCard group="Colors" viewport="700x180" name="People panel · aubergine" subtitle="The one warm, human surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); }
  .wrap { padding: 22px 28px; }
  .panel { background: var(--people-panel); border: 1px solid var(--line-faint); border-radius: var(--r-panel); padding: 24px 28px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .ey { font-family: var(--font-mono); font-size: 12px; letter-spacing: .24em; color: var(--people-eyebrow); width: 100%; }
  .sw { display: flex; flex-direction: column; gap: 6px; align-items: center; font-family: var(--font-mono); font-size: 10px; color: var(--people-text); }
  .chip { width: 56px; height: 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,.12); }
  .cream { background: var(--people-cream); color: var(--people-espresso); font-family: var(--font-body); font-weight: 600; font-size: 14px; padding: 12px 22px; border-radius: var(--r-pill); }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <span class="ey">04 — WHO YOU WORK WITH</span>
    <div class="sw"><div class="chip" style="background:#31242F"></div>#31242F</div>
    <div class="sw"><div class="chip" style="background:#271B25"></div>#271B25</div>
    <div class="sw"><div class="chip" style="background:var(--people-text)"></div>body</div>
    <div class="cream">Meet the team</div>
    <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--people-chip);border:1px solid rgba(255,255,255,.2);padding:9px 13px;border-radius:2px;">SENIOR-ONLY · SINCE DAY ONE</span>
  </div>
</div>
</body>
</html>
