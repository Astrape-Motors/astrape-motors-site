<!-- @dsCard group="Type" viewport="700x190" name="Display · Space Grotesk" subtitle="Headings & wordmark — tight tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text-primary); }
  .wrap { padding: 24px 28px; }
  h1 { font-family: var(--font-display); font-weight: 700; font-size: 52px; line-height: .98; letter-spacing: -0.035em; margin: 0 0 6px; }
  .grad { background: var(--grad-brand); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-mono-muted); margin-top: 14px; letter-spacing: .04em; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Electrify everything that <span class="grad">moves.</span></h1>
  <div class="meta">Space Grotesk · 700 / 600 / 500 · letter-spacing −0.035em → −0.02em · line-height 0.98–1.05</div>
</div>
</body>
</html>
