<!-- @dsCard group="Type" viewport="700x180" name="Mono · IBM Plex Mono" subtitle="Eyebrows, spec readouts, tags — wide tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text-primary); font-family: var(--font-mono); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
  .eyebrow { font-size: 12.5px; letter-spacing: .28em; color: var(--text-eyebrow); }
  .legend span { font-size: 12.5px; letter-spacing: .3em; }
  .tags { display: flex; gap: 10px; }
  .tag { font-size: 11px; letter-spacing: .06em; padding: 5px 9px; border-radius: 2px; }
  .meta { font-size: 11px; color: var(--text-mono-muted); letter-spacing: .04em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">01 — WHAT WE DO</div>
  <div class="legend"><span style="color:var(--disc-electrification)">ELECTRIFICATION</span><span style="color:var(--text-mono-muted)"> · </span><span style="color:var(--disc-controls)">CONTROLS</span><span style="color:var(--text-mono-muted)"> · </span><span style="color:var(--disc-automation)">AUTOMATION</span><span style="color:var(--text-mono-muted)"> · </span><span style="color:var(--disc-rnd)">R&amp;D</span></div>
  <div class="tags">
    <span class="tag" style="color:var(--disc-electrification);border:1px solid color-mix(in srgb,var(--disc-electrification) 32%,transparent)">EV · HEV</span>
    <span class="tag" style="color:var(--disc-automation);border:1px solid color-mix(in srgb,var(--disc-automation) 32%,transparent)">HIL · SIL</span>
  </div>
  <div class="meta">IBM Plex Mono · 400 / 500 · letter-spacing .14em–.30em · 11px–13px</div>
</div>
</body>
</html>
