<!-- @dsCard group="Brand" viewport="700x170" name="Lightning mark" subtitle="The brand's only glyph — bolt + glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text-primary); }
  .wrap { display: flex; align-items: center; gap: 44px; padding: 28px 36px; flex-wrap: wrap; }
  .bolt { background: var(--brand-blue); clip-path: var(--bolt-clip); box-shadow: 0 0 30px color-mix(in srgb, var(--brand-blue) 55%, transparent); }
  .lockup { display: flex; align-items: center; gap: 13px; }
  .wm { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: var(--ls-wordmark); }
  .wm span { opacity: .45; font-weight: 500; }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--text-mono-muted); line-height: 1.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="bolt" style="width:54px;height:80px"></div>
  <div class="lockup">
    <div class="bolt" style="width:17px;height:25px;box-shadow:0 0 14px color-mix(in srgb,var(--brand-blue) 55%,transparent)"></div>
    <div class="wm">ASTRAPE <span>MOTORS</span></div>
  </div>
  <div class="note">clip-path polygon · electric blue<br>soft glow halo · floats on contact CTA</div>
</div>
</body>
</html>
