<!-- @dsCard group="Colors" viewport="700x150" name="Text colors" subtitle="Five steps of grey on the spine" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text-primary); }
  .wrap { display: flex; flex-direction: column; gap: 4px; padding: 22px 28px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; }
  .t { font-family: var(--font-display); font-weight: 600; font-size: 19px; width: 240px; }
  .h { font-family: var(--font-mono); font-size: 11px; color: var(--text-mono-muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="t" style="color:var(--text-primary)">Primary heading</span><span class="h">--text-primary · #E7EAF0</span></div>
  <div class="row"><span class="t" style="color:var(--text-secondary)">Secondary lead</span><span class="h">--text-secondary · #A7AEB8</span></div>
  <div class="row"><span class="t" style="color:var(--text-tertiary)">Tertiary body</span><span class="h">--text-tertiary · #9AA3AF</span></div>
  <div class="row"><span class="t" style="color:var(--text-eyebrow)">Eyebrow neutral</span><span class="h">--text-eyebrow · #7D8590</span></div>
  <div class="row"><span class="t" style="color:var(--text-mono-muted)">Muted / mono</span><span class="h">--text-mono-muted · #5D6470</span></div>
</div>
</body>
</html>
