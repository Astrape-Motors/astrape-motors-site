<!-- @dsCard group="Colors" viewport="700x150" name="Spine · surfaces" subtitle="Warm-neutral near-blacks, low chroma" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text-primary); font-family: var(--font-mono); }
  .wrap { display: flex; gap: 10px; padding: 24px 28px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 100px; border-radius: var(--r-card); border: 1px solid var(--line); padding: 12px 12px; min-height: 92px; display: flex; flex-direction: column; justify-content: flex-end; }
  .n { font-size: 11px; color: var(--text-secondary); }
  .h { font-size: 10px; color: var(--text-mono-muted); margin-top: 3px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw" style="background:var(--bg)"><span class="n">base</span><span class="h">#0A0907</span></div>
  <div class="sw" style="background:var(--bg-footer)"><span class="n">footer</span><span class="h">#080705</span></div>
  <div class="sw" style="background:var(--bg-process)"><span class="n">method</span><span class="h">#0D0B08</span></div>
  <div class="sw" style="background:var(--surface-card)"><span class="n">card</span><span class="h">#0C0F14</span></div>
  <div class="sw" style="background:var(--surface-card-sector)"><span class="n">sector</span><span class="h">#0A0D11</span></div>
  <div class="sw" style="background:var(--surface-well)"><span class="n">photo well</span><span class="h">#10141A</span></div>
  <div class="sw" style="background:var(--surface-marquee)"><span class="n">marquee</span><span class="h">#090C10</span></div>
</div>
</body>
</html>
