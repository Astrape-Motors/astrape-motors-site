<!-- @dsCard group="Colors" viewport="700x230" name="Harmonic families" subtitle="Each hue, tint → shade — derived off the blue (triad + complement)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text-primary); font-family: var(--font-mono); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 10px; }
  .fam { display: flex; align-items: center; gap: 16px; }
  .lbl { width: 96px; font-size: 11px; color: var(--text-tertiary); flex: none; }
  .ramp { display: flex; flex: 1; height: 34px; border-radius: 4px; overflow: hidden; }
  .ramp > div { flex: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="fam"><span class="lbl">BLUE 220°</span><div class="ramp"><div style="background:var(--blue-100)"></div><div style="background:var(--blue-200)"></div><div style="background:var(--blue-300)"></div><div style="background:var(--blue-500)"></div><div style="background:var(--blue-700)"></div><div style="background:var(--blue-900)"></div></div></div>
  <div class="fam"><span class="lbl">OLIVE 100°</span><div class="ramp"><div style="background:var(--olive-100)"></div><div style="background:var(--olive-200)"></div><div style="background:var(--olive-300)"></div><div style="background:var(--olive-500)"></div><div style="background:var(--olive-700)"></div><div style="background:var(--olive-900)"></div></div></div>
  <div class="fam"><span class="lbl">PLUM 340°</span><div class="ramp"><div style="background:var(--plum-100)"></div><div style="background:var(--plum-200)"></div><div style="background:var(--plum-300)"></div><div style="background:var(--plum-500)"></div><div style="background:var(--plum-700)"></div><div style="background:var(--plum-900)"></div></div></div>
  <div class="fam"><span class="lbl">CLAY 45°</span><div class="ramp"><div style="background:var(--clay-100)"></div><div style="background:var(--clay-200)"></div><div style="background:var(--clay-300)"></div><div style="background:var(--clay-500)"></div><div style="background:var(--clay-700)"></div><div style="background:var(--clay-900)"></div></div></div>
  <div class="fam"><span class="lbl">TAN hinge</span><div class="ramp" style="border:1px solid var(--line)"><div style="background:var(--tan-100)"></div><div style="background:var(--tan-200)"></div><div style="background:var(--tan-300)"></div><div style="background:var(--tan-500)"></div><div style="background:var(--tan-700)"></div><div style="background:var(--tan-900)"></div></div></div>
</div>
</body>
</html>
